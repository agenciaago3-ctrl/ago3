<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGO3</title>

    <link rel="shortcut icon" href="ago3-icone.ico" type="image/x-icon">

    <meta property="og:title" content="AGO3">
    <meta property="og:description" content="Agência Criativa">
    <meta property="og:image" content="https://ago3.com.br/og.jpg">
    <meta property="og:url" content="https://ago3.com.br">

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center; 
            height: 100vh;
            background-color: #92FF00;
            font-family: 'Open Sans', sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: -15vh; 
        }

        .logo {
            width: 340px; 
            height: auto;
            margin-bottom: 6px; /* Ajustado conforme seu último pedido */
        }

        .frase {
            font-weight: 300;
            font-size: 20pt; 
            color: #000000;
            margin: 0 0 35px 0;
            white-space: nowrap; 
        }

        .social-links {
            display: flex;
            gap: 12px;
        }

        .btn {
            background-color: #7100FF; 
            color: white;
            text-decoration: none;
            padding: 10px 40px;
            border-radius: 50px; 
            font-size: 13pt;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #5a00cc;
        }

        @media (max-width: 480px) {
            .frase { 
                font-size: 14pt; 
                white-space: normal; 
            }
            .btn {
                padding: 10px 25px;
                font-size: 11pt;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo-transparente-ago3.png" alt="Logo AGO3" class="logo">
        
        <p class="frase">Agência criativa em São José do Rio Preto.</p>

        <div class="social-links">
            <a href="https://www.instagram.com/ago3.agencia/" target="_blank" class="btn">Instagram</a>
            <a href="https://wa.me/5517996750980" target="_blank" class="btn">WhatsApp</a>
        </div>
    </div>

</body>
</html>
